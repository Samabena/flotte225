services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: flotte225-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # paste your Neon connection string in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: SHOW_DOCS
        value: false
      - key: CORS_ORIGINS
        value: https://flotte225-backend.onrender.com
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      # SendGrid
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

