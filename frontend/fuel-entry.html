<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saisie carburant — Flotte225</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green: { DEFAULT: '#005F02', light: '#e6f0e6' },
            gold:  { DEFAULT: '#C0B87A' },
            cream: '#F2E3BB',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F2E3BB; font-family: 'Inter', system-ui, sans-serif; }
    .sidebar { background: #005F02; }
    .card { background: #fff; border-radius: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .input-field { border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; transition: box-shadow .15s; width: 100%; }
    .input-field:focus { box-shadow: 0 0 0 2px rgba(0,95,2,.25); border-color: #005F02; }
      #sidebar { transition: width 0.25s ease; overflow: hidden; }
    #sidebar.collapsed { width: 3.5rem; padding-left: 0.625rem; padding-right: 0.625rem; }
    #sidebar.collapsed .sidebar-label { display: none; }
    #sidebar.collapsed .sidebar-logo { justify-content: center; }
    #sidebar.collapsed nav a, #sidebar.collapsed nav button,
    #sidebar.collapsed .sidebar-action-btn { justify-content: center; }
    #sidebar.collapsed .sidebar-bottom-btn { justify-content: center; }
    #sidebar-toggle svg { transition: transform 0.25s ease; }
    #sidebar.collapsed #sidebar-toggle svg { transform: rotate(180deg); }
    /* Mobile sidebar */
    #sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
    #sidebar-backdrop.show { display: block; }
    #mobile-topbar { display: none; }
    @media (max-width: 639px) {
      #sidebar { position: fixed !important; top: 0; left: 0; z-index: 40; height: 100% !important; width: 14rem !important; transform: translateX(-100%) !important; transition: transform 0.25s ease !important; }
      #sidebar.mobile-open { transform: translateX(0) !important; }
      #mobile-topbar { display: flex !important; }
      main { padding-top: 3.5rem; }
    }
  </style>
</head>
<body class="h-screen flex overflow-hidden">

  <!-- Mobile topbar -->
  <div id="mobile-topbar" class="fixed top-0 left-0 right-0 z-20 items-center gap-3 px-4 h-14 bg-[#005F02] text-white">
    <button id="mobile-menu-btn" class="p-2 rounded hover:bg-white/10 transition" aria-label="Menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-bold text-[#C0B87A] text-lg">Flotte225</span>
  </div>
  <div id="sidebar-backdrop"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-56 h-screen flex flex-col p-5 text-white shrink-0">
    <div class="sidebar-logo mb-8 flex items-center justify-between gap-2">
      <span class="text-xl font-bold tracking-wide text-[#C0B87A] sidebar-label">Flotte225</span>
      <button id="sidebar-toggle" class="text-white/60 hover:text-white p-1 rounded hover:bg-white/10 transition shrink-0" title="Réduire">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
    </div>
    <nav class="flex flex-col gap-1 text-sm font-medium">
      <a href="/dashboard-driver" class="px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Tableau de bord">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        <span class="sidebar-label">Tableau de bord</span>
      </a>
      <a href="/fuel-entry" class="px-3 py-2 rounded-lg bg-white/10 flex items-center gap-3" title="Saisie carburant">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z"/></svg>
        <span class="sidebar-label">Saisie carburant</span>
      </a>
    </nav>
    <div class="mt-auto">
      <button id="btn-logout" class="sidebar-bottom-btn flex items-center gap-3 w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 text-sm" title="Déconnexion">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
        <span class="sidebar-label">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-4 sm:p-6 overflow-y-auto">
    <h1 class="text-2xl font-bold text-[#005F02] mb-6">Saisie carburant</h1>

    <!-- New entry form -->
    <div class="card p-6 mb-6">
      <p class="font-semibold text-gray-700 mb-4">Nouvelle saisie</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-500 mb-1">Véhicule *</label>
          <select id="f-vehicle" class="input-field bg-white">
            <option value="">Chargement…</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Date *</label>
          <input id="f-date" type="date" class="input-field" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Kilométrage (km) *</label>
          <input id="f-odometer" type="number" min="1" class="input-field" placeholder="Ex : 45200" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Quantité (litres) *</label>
          <input id="f-quantity" type="number" min="0.1" step="0.1" class="input-field" placeholder="Ex : 40.5" />
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs text-gray-500 mb-1">Montant (FCFA) *</label>
          <input id="f-amount" type="number" min="1" class="input-field" placeholder="Ex : 28000" />
        </div>
      </div>
      <div id="form-error"   class="hidden text-red-600 text-xs mt-3"></div>
      <div id="form-success" class="hidden text-green-700 text-xs mt-3"></div>
      <button id="btn-submit"
        class="mt-4 bg-[#005F02] text-white text-sm font-semibold px-6 py-2.5 rounded-lg hover:bg-[#004a01] transition disabled:opacity-40">
        Enregistrer la saisie
      </button>
    </div>

    <!-- History table -->
    <div class="card p-5">
      <p class="font-semibold text-gray-700 mb-3">Historique des saisies</p>
      <div id="history-loading" class="text-center text-gray-400 text-sm py-6">Chargement…</div>
      <div class="overflow-x-auto">
      <table id="history-table" class="hidden w-full text-sm">
        <thead>
          <tr class="text-left text-gray-500 border-b">
            <th class="pb-2 font-medium">Date</th>
            <th class="pb-2 font-medium">Véhicule</th>
            <th class="pb-2 font-medium text-right">Km</th>
            <th class="pb-2 font-medium text-right">Qté (L)</th>
            <th class="pb-2 font-medium text-right">Montant (FCFA)</th>
            <th class="pb-2 font-medium text-right">L/100km</th>
            <th class="pb-2 font-medium text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
      </div>
      <p id="empty-history" class="hidden text-center text-gray-400 text-sm py-6">Aucune saisie enregistrée</p>
    </div>
  </main>

  <!-- Edit entry modal -->
  <div id="modal-edit" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-[#005F02]">Modifier la saisie</h2>
        <button id="modal-edit-close" class="text-gray-400 hover:text-gray-700 text-xl leading-none">&times;</button>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">Date</label>
          <input id="e-date" type="date" class="input-field" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Kilométrage (km)</label>
          <input id="e-odometer" type="number" min="1" class="input-field" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Quantité (litres)</label>
          <input id="e-quantity" type="number" min="0.1" step="0.1" class="input-field" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Montant (FCFA)</label>
          <input id="e-amount" type="number" min="1" class="input-field" />
        </div>
      </div>
      <div id="edit-error" class="hidden text-red-600 text-xs mt-3"></div>
      <div class="flex gap-2 mt-5">
        <button id="modal-edit-cancel" class="flex-1 border border-gray-200 rounded-lg py-2 text-sm hover:bg-gray-50">Annuler</button>
        <button id="btn-save-edit" class="flex-1 bg-[#005F02] text-white rounded-lg py-2 text-sm font-medium hover:bg-[#004a01]">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div id="modal-confirm" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center">
      <p class="text-gray-700 text-sm mb-5">Supprimer cette saisie ? Cette action est irréversible.</p>
      <div class="flex gap-2">
        <button id="confirm-cancel" class="flex-1 border border-gray-200 rounded-lg py-2 text-sm hover:bg-gray-50">Annuler</button>
        <button id="confirm-ok" class="flex-1 bg-red-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-red-700">Supprimer</button>
      </div>
    </div>
  </div>

    <script>
  (function(){var s=document.getElementById('sidebar'),t=document.getElementById('sidebar-toggle'),mb=document.getElementById('mobile-menu-btn'),bd=document.getElementById('sidebar-backdrop');if(!s||!t)return;if(localStorage.getItem('flotte225-sidebar-collapsed')==='true')s.classList.add('collapsed');t.addEventListener('click',function(){s.classList.toggle('collapsed');localStorage.setItem('flotte225-sidebar-collapsed',s.classList.contains('collapsed'));});if(mb&&bd){mb.addEventListener('click',function(){s.classList.add('mobile-open');bd.classList.add('show');});bd.addEventListener('click',function(){s.classList.remove('mobile-open');bd.classList.remove('show');});}})();
  </script>
  <script src="js/fuel.js"></script>
</body>
</html>
