<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapports — Flotte225</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            green: { DEFAULT: '#005F02', light: '#e6f0e6' },
            gold: { DEFAULT: '#C0B87A', light: '#f7f4e8' },
            cream: '#F2E3BB',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F2E3BB; font-family: 'Inter', system-ui, sans-serif; }
    .sidebar { background: #005F02; }
    .card { background: #fff; border-radius: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .btn-primary { background: #005F02; color: #fff; border-radius: 0.5rem; padding: 0.5rem 1.25rem; font-size: 0.875rem; font-weight: 600; transition: background .15s; }
    .btn-primary:hover:not(:disabled) { background: #004801; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.5rem 1.25rem; font-size: 0.875rem; font-weight: 600; transition: all .15s; }
    .btn-secondary:hover { background: #f9fafb; border-color: #9ca3af; }
    .input-field { border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; transition: box-shadow .15s; }
    .input-field:focus { box-shadow: 0 0 0 2px rgba(0,95,2,.25); border-color: #005F02; }
    .tab-btn { border-bottom: 2px solid transparent; padding: 0.5rem 0.75rem; font-size: 0.875rem; color: #6b7280; }
    .tab-btn.active { border-color: #005F02; color: #005F02; font-weight: 600; }
    .preset-chip { border: 1px solid #d1d5db; border-radius: 999px; padding: 0.25rem 0.75rem; font-size: 0.8rem; cursor: pointer; background: #fff; transition: all .15s; }
    .preset-chip:hover { border-color: #005F02; color: #005F02; }
    .preset-chip.active { background: #005F02; color: #fff; border-color: #005F02; }
      #sidebar { transition: width 0.25s ease; overflow: hidden; }
    #sidebar.collapsed { width: 3.5rem; padding-left: 0.625rem; padding-right: 0.625rem; }
    #sidebar.collapsed .sidebar-label { display: none; }
    #sidebar.collapsed .sidebar-logo { justify-content: center; }
    #sidebar.collapsed nav a, #sidebar.collapsed nav button,
    #sidebar.collapsed .sidebar-action-btn { justify-content: center; }
    #sidebar.collapsed .sidebar-bottom-btn { justify-content: center; }
    #sidebar-toggle svg { transition: transform 0.25s ease; }
    #sidebar.collapsed #sidebar-toggle svg { transform: rotate(180deg); }
    /* Mobile sidebar */
    #sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
    #sidebar-backdrop.show { display: block; }
    #mobile-topbar { display: none; }
    @media (max-width: 639px) {
      #sidebar { position: fixed !important; top: 0; left: 0; z-index: 40; height: 100% !important; width: 14rem !important; transform: translateX(-100%) !important; transition: transform 0.25s ease !important; }
      #sidebar.mobile-open { transform: translateX(0) !important; }
      #mobile-topbar { display: flex !important; }
      main { padding-top: 3.5rem; }
    }
  </style>
</head>
<body class="h-screen flex overflow-hidden">

  <!-- Mobile topbar -->
  <div id="mobile-topbar" class="fixed top-0 left-0 right-0 z-20 items-center gap-3 px-4 h-14 bg-[#005F02] text-white">
    <button id="mobile-menu-btn" class="p-2 rounded hover:bg-white/10 transition" aria-label="Menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="font-bold text-[#C0B87A] text-lg">Flotte225</span>
  </div>
  <div id="sidebar-backdrop"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-56 h-screen flex flex-col p-5 text-white shrink-0">
    <div class="sidebar-logo mb-8 flex items-center justify-between gap-2">
      <span class="text-xl font-bold tracking-wide text-[#C0B87A] sidebar-label">Flotte225</span>
      <button id="sidebar-toggle" class="text-white/60 hover:text-white p-1 rounded hover:bg-white/10 transition shrink-0" title="Réduire">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
    </div>
    <nav class="flex flex-col gap-1 text-sm font-medium">
      <a href="/dashboard-owner" class="px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Tableau de bord">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        <span class="sidebar-label">Tableau de bord</span>
      </a>
      <a href="/vehicles" class="px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Véhicules">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
        <span class="sidebar-label">Véhicules</span>
      </a>
      <a href="/maintenance" class="px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Maintenance">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/></svg>
        <span class="sidebar-label">Maintenance</span>
      </a>
      <a href="/reports-template" class="px-3 py-2 rounded-lg bg-white/10 flex items-center gap-3" title="Rapports">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        <span class="sidebar-label">Rapports</span>
      </a>
    </nav>

    <div class="mt-auto flex flex-col gap-1 text-sm">
      <a href="/activity" class="sidebar-bottom-btn px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Journal d'activité">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="sidebar-label">Journal d'activité</span>
      </a>
      <a href="/settings" class="sidebar-bottom-btn px-3 py-2 rounded-lg hover:bg-white/10 flex items-center gap-3" title="Paramètres">
        <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span class="sidebar-label">Paramètres</span>
      </a>
      <div class="mt-2 pt-2 border-t border-white/10">
        <button id="btn-logout" class="sidebar-bottom-btn flex items-center gap-3 w-full text-left px-3 py-2 rounded-lg hover:bg-white/10 text-sm" title="Déconnexion">
          <svg class="shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
          <span class="sidebar-label">Déconnexion</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto p-4 sm:p-8">
    <div class="max-w-5xl mx-auto space-y-6">

      <!-- Header -->
      <div>
        <h1 class="text-2xl font-bold text-[#005F02]">Rapports</h1>
        <p class="text-sm text-gray-500 mt-1">
          Générez un rapport, prévisualisez-le, puis téléchargez-le si besoin.
        </p>
      </div>

      <!-- Plan banner -->
      <div id="plan-banner" class="hidden rounded-lg px-4 py-3 text-sm font-medium"></div>

      <!-- Form card -->
      <div id="reports-panel" class="hidden card p-6">
        <div class="flex items-center gap-2 border-b border-gray-200 mb-4">
          <button class="tab-btn active" data-tab="fleet" id="tab-fleet">Rapport flotte</button>
          <button class="tab-btn" data-tab="driver" id="tab-driver">Rapport conducteur</button>
        </div>

        <!-- Driver picker -->
        <div id="driver-picker" class="hidden mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Conducteur</label>
          <select id="driver-select" class="input-field w-full">
            <option value="">Chargement…</option>
          </select>
        </div>

        <!-- Period presets -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Période</label>
          <div class="flex flex-wrap gap-2">
            <button class="preset-chip active" data-preset="last30">30 derniers jours</button>
            <button class="preset-chip" data-preset="last7">7 derniers jours</button>
            <button class="preset-chip" data-preset="thisMonth">Mois en cours</button>
            <button class="preset-chip" data-preset="lastMonth">Mois précédent</button>
            <button class="preset-chip" data-preset="thisYear">Année en cours</button>
            <button class="preset-chip" data-preset="custom">Personnalisée</button>
          </div>
        </div>

        <!-- Custom range -->
        <div id="custom-range" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          <div>
            <label class="block text-xs text-gray-600 mb-1">Du</label>
            <input type="date" id="date-from" class="input-field w-full">
          </div>
          <div>
            <label class="block text-xs text-gray-600 mb-1">Au</label>
            <input type="date" id="date-to" class="input-field w-full">
          </div>
        </div>

        <div class="flex items-center gap-3 pt-2">
          <button id="btn-preview" class="btn-primary">
            Aperçu du rapport
          </button>
          <p id="feedback" class="text-sm hidden"></p>
        </div>
      </div>

      <!-- Preview panel (shown after generation) -->
      <div id="preview-panel" class="hidden card overflow-hidden">
        <div class="flex flex-wrap items-center justify-between gap-2 px-5 py-3 border-b border-gray-200">
          <span class="text-sm font-semibold text-gray-700">Aperçu du rapport</span>
          <div class="flex items-center gap-2">
            <button id="btn-download" class="btn-primary flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V4"/>
              </svg>
              Télécharger le PDF
            </button>
            <button id="btn-close-preview" class="btn-secondary">Fermer</button>
          </div>
        </div>
        <iframe
          id="pdf-frame"
          class="w-full"
          style="height: clamp(300px, 60vh, 72vh); border: none;"
          title="Aperçu du rapport PDF"
        ></iframe>
      </div>

    </div>
  </main>

    <script>
  (function(){var s=document.getElementById('sidebar'),t=document.getElementById('sidebar-toggle'),mb=document.getElementById('mobile-menu-btn'),bd=document.getElementById('sidebar-backdrop');if(!s||!t)return;if(localStorage.getItem('flotte225-sidebar-collapsed')==='true')s.classList.add('collapsed');t.addEventListener('click',function(){s.classList.toggle('collapsed');localStorage.setItem('flotte225-sidebar-collapsed',s.classList.contains('collapsed'));});if(mb&&bd){mb.addEventListener('click',function(){s.classList.add('mobile-open');bd.classList.add('show');});bd.addEventListener('click',function(){s.classList.remove('mobile-open');bd.classList.remove('show');});}})();
  </script>
  <script src="js/reports-template.js"></script>
</body>
</html>
